<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全顶会论文搜索</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        input[type="text"], input[type="number"] {
            width: 48%;
            padding: 10px;
            margin: 10px 1%;
            box-sizing: border-box;
        }
        button {
            padding: 10px;
            margin: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        .checkbox-container {
            margin-bottom: 10px;
        }
        .language-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
        }
        .load-more-container {
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="language-toggle">
        <button id="langSwitch" onclick="toggleLanguage()">Show in English</button>
    </div>

    <h1 id="mainTitle">安全顶会论文搜索</h1>
    
    <input type="text" id="titleAbstractInput" placeholder="正则搜索标题和摘要...">
    <input type="text" id="authorInput" placeholder="基于作者搜索...">
    <input type="number" id="yearInput" placeholder="只搜索某年以后的论文...">
    <button onclick="filterTable()" id="searchButton">搜索</button>

    <div class="checkbox-container">
        <button onclick="selectAll()" id="selectAllButton">全选</button>
        <button onclick="deselectAll()" id="deselectAllButton">全不选</button>
        <div id="publicationFilters"></div>
    </div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th id="indexHeader">序号</th>
                <th id="titleHeader">标题</th>
                <th id="abstractHeader">摘要</th>
                <th id="authorHeader">作者</th>
                <th id="yearHeader">年份</th>
                <th id="publicationHeader">发表刊物</th>
                <th id="linkHeader">链接</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            <!-- 结果将填充到这里 -->
        </tbody>
    </table>
    <div class="load-more-container">
        <button onclick="loadMoreRows()" id="loadMoreButton" style="display: none;">加载更多</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script>
        let jsonData = [];
        let filteredData = [];
        let renderedCount = 0;
        const PAGE_SIZE = 100;
        const FIRST_BATCH_FILE_COUNT = 6;
        const BACKGROUND_BATCH_FILE_COUNT = 4;
        const publicationMap = new Map();
        let currentLanguage = localStorage.getItem('language') || 'zh';

        const texts = {
            zh: {
                title: "安全顶会论文搜索",
                searchPlaceholder: "正则搜索标题和摘要...",
                authorPlaceholder: "基于作者搜索...",
                yearPlaceholder: "只搜索某年以后的论文...",
                toggleButton: "Show in English",
                searchButton: "搜索",
                selectAllButton: "全选",
                deselectAllButton: "全不选",
                indexHeader: "序号",
                titleHeader: "标题",
                abstractHeader: "摘要",
                authorHeader: "作者",
                yearHeader: "年份",
                publicationHeader: "发表刊物",
                linkHeader: "链接",
                viewLink: "查看",
                loadMore: "加载更多"
            },
            en: {
                title: "Security Top Conference Paper Search",
                searchPlaceholder: "Regex search titles and abstracts...",
                authorPlaceholder: "Search by author...",
                yearPlaceholder: "Only search papers after a certain year...",
                toggleButton: "中文显示",
                searchButton: "Search",
                selectAllButton: "Select All",
                deselectAllButton: "Deselect All",
                indexHeader: "Index",
                titleHeader: "Title",
                abstractHeader: "Abstract",
                authorHeader: "Author",
                yearHeader: "Year",
                publicationHeader: "Publication",
                linkHeader: "Link",
                viewLink: "View",
                loadMore: "Load More"
            }
        };

        function toggleLanguage() {
            currentLanguage = currentLanguage === 'zh' ? 'en' : 'zh';
            localStorage.setItem('language', currentLanguage);
            updateLanguage();
        }

        function updateLanguage() {
            document.getElementById('mainTitle').innerText = texts[currentLanguage].title;
            document.getElementById('titleAbstractInput').placeholder = texts[currentLanguage].searchPlaceholder;
            document.getElementById('authorInput').placeholder = texts[currentLanguage].authorPlaceholder;
            document.getElementById('yearInput').placeholder = texts[currentLanguage].yearPlaceholder;
            document.getElementById('langSwitch').innerText = texts[currentLanguage].toggleButton;
            document.getElementById('searchButton').innerText = texts[currentLanguage].searchButton;
            document.getElementById('selectAllButton').innerText = texts[currentLanguage].selectAllButton;
            document.getElementById('deselectAllButton').innerText = texts[currentLanguage].deselectAllButton;
            document.getElementById('indexHeader').innerText = texts[currentLanguage].indexHeader;
            document.getElementById('titleHeader').innerText = texts[currentLanguage].titleHeader;
            document.getElementById('abstractHeader').innerText = texts[currentLanguage].abstractHeader;
            document.getElementById('authorHeader').innerText = texts[currentLanguage].authorHeader;
            document.getElementById('yearHeader').innerText = texts[currentLanguage].yearHeader;
            document.getElementById('publicationHeader').innerText = texts[currentLanguage].publicationHeader;
            document.getElementById('linkHeader').innerText = texts[currentLanguage].linkHeader;
            document.getElementById('loadMoreButton').innerText = texts[currentLanguage].loadMore;
            if (filteredData.length > 0) {
                renderRows(true);
            }
        }

        function storeData(file, data) {
            const compressedData = LZString.compress(JSON.stringify(data));
            localStorage.setItem(file, compressedData);
        }

        function getData(file) {
            try {
                const compressedData = localStorage.getItem(file);
                if (!compressedData) {
                    return null;
                }
                const decompressed = LZString.decompress(compressedData);
                if (!decompressed) {
                    return null;
                }
                const parsed = JSON.parse(decompressed);
                return Array.isArray(parsed) ? parsed : null;
            } catch (error) {
                return null;
            }
        }

        function normalizeItem(item) {
            const title = typeof item.title === 'string' ? item.title : '';
            const abstract = typeof item.abstract === 'string' ? item.abstract : '';
            const author = typeof item.author === 'string' ? item.author : '';
            const yearNumber = parseInt(item.year, 10);
            return {
                ...item,
                _titleAbstractLower: `${title} ${abstract}`.toLowerCase(),
                _authorLower: author.toLowerCase(),
                _yearNumber: Number.isNaN(yearNumber) ? 0 : yearNumber
            };
        }

        function createFilterId(publication) {
            return `filter-${encodeURIComponent(publication)}`;
        }

        function appendPublicationFilter(publication) {
            if (!publication || publicationMap.has(publication)) {
                return;
            }
            const filterContainer = document.getElementById('publicationFilters');
            const wrapper = document.createElement('div');
            const checkbox = document.createElement('input');
            const filterId = createFilterId(publication);
            checkbox.type = 'checkbox';
            checkbox.checked = true;
            checkbox.value = publication;
            checkbox.id = filterId;
            checkbox.onchange = filterTable;
            const label = document.createElement('label');
            label.htmlFor = filterId;
            label.innerText = publication;
            wrapper.appendChild(checkbox);
            wrapper.appendChild(label);
            filterContainer.appendChild(wrapper);
            publicationMap.set(publication, checkbox);
        }

        function loadPublicationFilters(data) {
            data.forEach(item => appendPublicationFilter(item.publication));
        }

        function renderRows(reset = false) {
            const tableBody = document.getElementById('resultsBody');
            if (reset) {
                renderedCount = 0;
                tableBody.innerHTML = "";
            }
            const end = Math.min(renderedCount + PAGE_SIZE, filteredData.length);
            const fragment = document.createDocumentFragment();
            for (let index = renderedCount; index < end; index += 1) {
                const item = filteredData[index];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.title || ''}</td>
                    <td>${item.abstract || ''}</td>
                    <td>${item.author || ''}</td>
                    <td>${item.year || ''}</td>
                    <td>${item.publication || ''}</td>
                    <td><a href="${item.link || '#'}" target="_blank">${texts[currentLanguage].viewLink}</a></td>
                `;
                fragment.appendChild(row);
            }
            tableBody.appendChild(fragment);
            renderedCount = end;
            document.getElementById('loadMoreButton').style.display = renderedCount < filteredData.length ? 'inline-block' : 'none';
        }

        function loadMoreRows() {
            renderRows(false);
        }

        function buildTitleMatcher(input) {
            const trimmed = input.trim();
            if (!trimmed) {
                return () => true;
            }
            try {
                const regex = new RegExp(trimmed, 'i');
                return item => regex.test(item.title || '') || regex.test(item.abstract || '');
            } catch (error) {
                const plain = trimmed.toLowerCase();
                return item => item._titleAbstractLower.includes(plain);
            }
        }

        async function loadJsonFile(file) {
            const cachedData = getData(file);
            if (cachedData) {
                return cachedData;
            }
            const response = await fetch(file);
            const data = await response.json();
            storeData(file, data);
            return data;
        }

        async function loadFileBatch(files) {
            const datasets = await Promise.all(files.map(loadJsonFile));
            const merged = datasets.flat().map(normalizeItem);
            jsonData.push(...merged);
            loadPublicationFilters(merged);
        }

        async function loadRemainingFiles(files) {
            for (let i = 0; i < files.length; i += BACKGROUND_BATCH_FILE_COUNT) {
                const batch = files.slice(i, i + BACKGROUND_BATCH_FILE_COUNT);
                await loadFileBatch(batch);
                filterTable();
                await new Promise(resolve => setTimeout(resolve, 0));
            }
        }

        async function loadConfig() {
            const response = await fetch('config.json');
            const config = await response.json();
            const files = Array.isArray(config.json_files) ? config.json_files : [];
            const firstBatch = files.slice(0, FIRST_BATCH_FILE_COUNT);
            const remainingFiles = files.slice(FIRST_BATCH_FILE_COUNT);
            await loadFileBatch(firstBatch);
            filterTable();
            loadRemainingFiles(remainingFiles);
        }

        function filterTable() {
            const titleAbstractInput = document.getElementById('titleAbstractInput').value.trim();
            const authorInputLower = document.getElementById('authorInput').value.trim().toLowerCase();
            const yearInputValue = document.getElementById('yearInput').value.trim();
            const minYear = yearInputValue ? parseInt(yearInputValue, 10) : null;
            const titleMatcher = buildTitleMatcher(titleAbstractInput);

            const checkedPublications = new Set(
                [...document.querySelectorAll('#publicationFilters input:checked')].map(checkbox => checkbox.value)
            );

            const nextFilteredData = jsonData.filter(item => {
                const titleMatch = titleMatcher(item);
                const authorMatch = !authorInputLower || item._authorLower.includes(authorInputLower);
                const yearMatch = minYear === null || (!Number.isNaN(minYear) && item._yearNumber >= minYear);
                const publicationMatch = checkedPublications.has(item.publication);

                return titleMatch && authorMatch && yearMatch && publicationMatch;
            });
            filteredData = nextFilteredData;
            renderRows(true);
        }

        function selectAll() {
            const checkboxes = document.querySelectorAll('#publicationFilters input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = true;
            });
            filterTable();
        }

        function deselectAll() {
            const checkboxes = document.querySelectorAll('#publicationFilters input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            filterTable();
        }

        loadConfig();
        updateLanguage();

        document.getElementById('titleAbstractInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                filterTable();
            }
        });
        document.getElementById('authorInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                filterTable();
            }
        });
        document.getElementById('yearInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                filterTable();
            }
        });

    </script>

</body>
</html>
